<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/credit-card-validator/">
  <title>Credit Card Validator</title>
</head>
<body>
  <div class="container">
    <h1>Credit Card Validator</h1>
    <div class="card-icons">
      <img src="./img/visa.svg" alt="Visa" class="card-icon" id="visa-icon">
      <img src="./img/mastercard.svg" alt="Mastercard" class="card-icon" id="mastercard-icon">
      <img src="./img/amex.svg" alt="American Express" class="card-icon" id="amex-icon">
      <img src="./img/discover.svg" alt="Discover" class="card-icon" id="discover-icon">
      <img src="./img/jcb.png" alt="JCB" class="card-icon" id="jcb-icon">
      <img src="./img/diners.png" alt="Diners Club" class="card-icon" id="diners-icon">
      <img src="./img/mir.png" alt="Mir" class="card-icon" id="mir-icon">
    </div>
    <form id="card-form">
  <input type="text" id="card-input" placeholder="Введите номер карты" autocomplete="off">
  <button type="submit">Click to Validate</button>
    </form>
    <div id="result"></div>
  </div>
</body>
</html>
